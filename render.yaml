services:
  - type: web
    name: coryziller-sentiment-api
    runtime: python
    plan: free
    rootDir: railway-api
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: BREVO_API_KEY
        sync: false
      - key: SENDER_EMAIL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ALLOWED_ORIGIN
        value: https://coryziller.github.io
